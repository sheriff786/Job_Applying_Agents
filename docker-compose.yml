version: "3.8"

services:
  # PostgreSQL with pgvector
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: job_agent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis for Celery
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Main application
  app:
    build: .
    command: uvicorn src.api:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./data:/app/data
      - ./credentials:/app/credentials
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:password@db:5432/job_agent
      - DATABASE_URL_SYNC=postgresql://postgres:password@db:5432/job_agent
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env

  # Celery worker
  worker:
    build: .
    command: celery -A src.tasks worker --loglevel=info
    volumes:
      - .:/app
      - ./data:/app/data
      - ./credentials:/app/credentials
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:password@db:5432/job_agent
      - DATABASE_URL_SYNC=postgresql://postgres:password@db:5432/job_agent
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env

  # Celery beat (scheduler)
  beat:
    build: .
    command: celery -A src.tasks beat --loglevel=info
    volumes:
      - .:/app
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env

volumes:
  pgdata:
